<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naviko — AI-Guided Immigration Compliance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: #0f0e17; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.6;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.7); } }
@keyframes pulse-ring { 0% { transform:scale(1); opacity:0.6; } 100% { transform:scale(1.4); opacity:0; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
const CTA_BANNER = ({ onCTA }) => (
  <section style={{ background: '#1a1730', position: 'relative', overflow: 'hidden', textAlign: 'center', padding: '120px 0' }}>
    <div style={{ position: 'absolute', bottom: -300, left: '50%', transform: 'translateX(-50%)', width: 600, height: 600, background: 'radial-gradient(ellipse, rgba(127,119,221,0.15) 0%, transparent 70%)', pointerEvents: 'none' }}></div>
    <div style={{ maxWidth: 1120, margin: '0 auto', padding: '0 32px', position: 'relative' }}>
      <h2 style={{ fontSize: 'clamp(28px,4vw,52px)', fontWeight: 700, letterSpacing: '-0.025em', lineHeight: 1.1, marginBottom: 20 }}>
        Your application shouldn't fail<br/>because of a photo that's<br/>
        <span style={{ background: 'linear-gradient(135deg,#7F77DD,#a49fe8)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>3 pixels too narrow.</span>
      </h2>
      <p style={{ fontSize: 17, color: '#9995b3', marginBottom: 40 }}>Naviko catches every fixable error before you submit.</p>
      <button onClick={onCTA} style={{
        fontFamily: 'DM Sans, sans-serif', fontSize: 16, fontWeight: 600,
        padding: '15px 36px', borderRadius: 999, background: '#7F77DD', color: '#fff', border: 'none', cursor: 'pointer',
        transition: 'opacity 0.2s, box-shadow 0.2s'
      }}
      onMouseEnter={e => { e.currentTarget.style.opacity='0.9'; e.currentTarget.style.boxShadow='0 4px 28px rgba(127,119,221,0.4)'; }}
      onMouseLeave={e => { e.currentTarget.style.opacity='1'; e.currentTarget.style.boxShadow='none'; }}
      >Start free — no credit card needed</button>
      <p style={{ marginTop: 16, fontSize: 13, color: '#9995b3', opacity: 0.7 }}>$49 only when you're ready to verify. Free forever if you just need the checklist.</p>
    </div>
  </section>
);

const EARLY_ACCESS_MODAL = ({ onClose }) => (
  <div style={{
    position: 'fixed', inset: 0, zIndex: 200,
    background: 'rgba(10,9,20,0.85)', backdropFilter: 'blur(12px)',
    display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24
  }} onClick={onClose}>
    <div style={{
      background: '#231f3a', border: '1px solid rgba(127,119,221,0.3)', borderRadius: 24,
      padding: 48, maxWidth: 440, width: '100%', position: 'relative'
    }} onClick={e => e.stopPropagation()}>
      <button onClick={onClose} style={{
        position: 'absolute', top: 16, right: 16, background: 'transparent',
        border: 'none', cursor: 'pointer', color: '#9995b3', fontSize: 20, lineHeight: 1
      }}>✕</button>
      <div style={{ textAlign: 'center', marginBottom: 32 }}>
        <div style={{
          width: 56, height: 56, borderRadius: 14, background: '#0f0e17',
          border: '1px solid rgba(127,119,221,0.25)', display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px', gap: 3
        }}>
          <span style={{ fontSize: 26, fontWeight: 700, color: '#fff', lineHeight: 1 }}>N</span>
          <span style={{ height: 2.5, width: 28, background: '#7F77DD', borderRadius: 2, display: 'block' }}></span>
        </div>
        <h3 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.3px', marginBottom: 8 }}>Get early access</h3>
        <p style={{ fontSize: 14, color: '#9995b3' }}>Join the waitlist — we'll notify you when your spot is ready.</p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <input placeholder="Full name" style={{
          background: '#0f0e17', border: '1.5px solid rgba(127,119,221,0.18)', borderRadius: 12,
          padding: '11px 14px', fontFamily: 'DM Sans, sans-serif', fontSize: 14, color: '#fff', outline: 'none'
        }} onFocus={e => e.target.style.borderColor='#7F77DD'} onBlur={e => e.target.style.borderColor='rgba(127,119,221,0.18)'} />
        <input placeholder="Email address" type="email" style={{
          background: '#0f0e17', border: '1.5px solid rgba(127,119,221,0.18)', borderRadius: 12,
          padding: '11px 14px', fontFamily: 'DM Sans, sans-serif', fontSize: 14, color: '#fff', outline: 'none'
        }} onFocus={e => e.target.style.borderColor='#7F77DD'} onBlur={e => e.target.style.borderColor='rgba(127,119,221,0.18)'} />
        <select style={{
          background: '#0f0e17', border: '1.5px solid rgba(127,119,221,0.18)', borderRadius: 12,
          padding: '11px 14px', fontFamily: 'DM Sans, sans-serif', fontSize: 14, color: '#9995b3', outline: 'none'
        }}>
          <option value="">Visa type you're applying for…</option>
          <option>US H-1B Work Visa</option>
          <option>US F-1 Student Visa</option>
          <option>Canada Express Entry</option>
          <option>Canada Study Permit</option>
          <option>Canada Work Permit</option>
          <option>Other</option>
        </select>
        <button style={{
          fontFamily: 'DM Sans, sans-serif', fontSize: 15, fontWeight: 600, padding: '13px',
          borderRadius: 999, background: '#7F77DD', color: '#fff', border: 'none', cursor: 'pointer',
          marginTop: 4, transition: 'opacity 0.2s'
        }}
        onMouseEnter={e => e.target.style.opacity='0.9'}
        onMouseLeave={e => e.target.style.opacity='1'}
        >Join waitlist</button>
      </div>
      <p style={{ textAlign: 'center', fontSize: 11, color: '#9995b3', opacity: 0.6, marginTop: 16 }}>Not legal advice — AI guidance only</p>
    </div>
  </div>
);

const App = () => {
  const [showModal, setShowModal] = React.useState(false);
  return (
    <>
      <Nav onCTA={() => setShowModal(true)} />
      <main style={{ paddingTop: 64 }}>
        <Hero onCTA={() => setShowModal(true)} />
        <HowItWorks />
        <Features />
        <Pricing onCTA={() => setShowModal(true)} />
        <CTA_BANNER onCTA={() => setShowModal(true)} />
      </main>
      <Footer />
      {showModal && <EARLY_ACCESS_MODAL onClose={() => setShowModal(false)} />}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
