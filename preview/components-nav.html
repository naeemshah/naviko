<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e17; font-family: 'DM Sans', sans-serif; }
nav { background: rgba(15,14,23,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(127,119,221,0.18); }
.inner { max-width: 900px; margin: 0 auto; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
.logo { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; color: #fff; position: relative; display: inline-block; }
.logo::after { content: ''; display: block; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: #7F77DD; border-radius: 2px; }
.links { display: flex; gap: 28px; list-style: none; }
.links a { font-size: 13px; font-weight: 500; color: #9995b3; transition: color 0.2s; text-decoration: none; }
.links a:hover { color: #fff; }
.cta { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 999px; border: 1.5px solid #7F77DD; color: #fff; background: transparent; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
.cta:hover { background: rgba(127,119,221,0.12); }
</style>
</head>
<body>
  <nav>
    <div class="inner">
      <a href="#" class="logo">Naviko</a>
      <ul class="links">
        <li><a href="#">How it works</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">For Consultants</a></li>
      </ul>
      <button class="cta">Get early access</button>
    </div>
  </nav>
</body>
</html>
