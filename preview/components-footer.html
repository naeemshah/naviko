<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e17; font-family: 'DM Sans', sans-serif; }
footer { border-top: 1px solid rgba(127,119,221,0.18); padding: 32px 24px 24px; }
.top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; gap: 20px; flex-wrap: wrap; }
.logo { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; color: #fff; position: relative; display: inline-block; }
.logo::after { content: ''; display: block; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: #7F77DD; border-radius: 2px; }
.tagline { font-size: 12px; color: #9995b3; margin-top: 8px; }
.links { display: flex; gap: 20px; flex-wrap: wrap; padding-top: 4px; }
.links a { font-size: 12.5px; color: #9995b3; text-decoration: none; transition: color 0.2s; }
.links a:hover { color: #fff; }
.bottom { padding-top: 20px; border-top: 1px solid rgba(127,119,221,0.12); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.legal { font-size: 11.5px; color: rgba(153,149,179,0.6); }
.notice { font-family: 'DM Mono', monospace; font-size: 10px; color: #9995b3; background: rgba(127,119,221,0.1); border: 1px solid rgba(127,119,221,0.2); border-radius: 999px; padding: 3px 10px; opacity: 0.8; }
</style>
</head>
<body>
  <footer>
    <div class="top">
      <div>
        <div class="logo">Naviko</div>
        <div class="tagline">AI-guided immigration compliance.</div>
        <div class="tagline" style="margin-top:6px;font-size:11px;opacity:0.65">Not a law firm. Nothing on this platform constitutes legal advice.</div>
      </div>
      <div class="links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">AI Disclaimer</a>
        <a href="#">Contact</a>
      </div>
    </div>
    <div class="bottom">
      <div class="legal">© 2026 Naviko. All rights reserved.</div>
      <div class="notice">Not legal advice — AI guidance only</div>
    </div>
  </footer>
</body>
</html>
