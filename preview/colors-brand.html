<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e17; font-family: 'DM Sans', sans-serif; padding: 24px; display: flex; gap: 24px; flex-wrap: wrap; }
.group { display: flex; flex-direction: column; gap: 6px; }
.label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #9995b3; margin-bottom: 4px; }
.swatch { width: 88px; height: 60px; border-radius: 8px; }
.name { font-family: 'DM Mono', monospace; font-size: 10px; color: #fff; margin-top: 4px; }
.val  { font-family: 'DM Mono', monospace; font-size: 9px; color: #9995b3; }
</style>
</head>
<body>
<div class="group">
  <div class="label">Purple</div>
  <div style="display:flex;gap:8px">
    <div>
      <div class="swatch" style="background:#7F77DD;"></div>
      <div class="name">purple</div><div class="val">#7F77DD</div>
    </div>
    <div>
      <div class="swatch" style="background:#EEEDFE;"></div>
      <div class="name">purple-light</div><div class="val">#EEEDFE</div>
    </div>
    <div>
      <div class="swatch" style="background:rgba(127,119,221,0.12);border:1px solid rgba(127,119,221,0.25);"></div>
      <div class="name">purple-dim</div><div class="val">12% opacity</div>
    </div>
    <div>
      <div class="swatch" style="background:rgba(127,119,221,0.25);border:1px solid rgba(127,119,221,0.4);"></div>
      <div class="name">purple-border</div><div class="val">25% opacity</div>
    </div>
  </div>
</div>
<div class="group">
  <div class="label">Teal</div>
  <div style="display:flex;gap:8px">
    <div>
      <div class="swatch" style="background:#1D9E75;"></div>
      <div class="name">teal</div><div class="val">#1D9E75</div>
    </div>
    <div>
      <div class="swatch" style="background:rgba(29,158,117,0.12);border:1px solid rgba(29,158,117,0.25);"></div>
      <div class="name">teal-dim</div><div class="val">12% opacity</div>
    </div>
  </div>
</div>
</body>
</html>
