<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e17; font-family: 'DM Mono', monospace; padding: 24px; display: flex; flex-direction: column; gap: 0; }
.row { display: flex; align-items: center; gap: 20px; padding: 12px 0; border-bottom: 1px solid rgba(127,119,221,0.12); }
.row:last-child { border-bottom: none; }
.meta { min-width: 100px; flex-shrink: 0; font-size: 9px; color: #9995b3; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">step numbers</div>
    <div style="font-size:20px;font-weight:500;color:#7F77DD;letter-spacing:-0.02em">01 &nbsp; 02 &nbsp; 03</div>
  </div>
  <div class="row">
    <div class="meta">pricing</div>
    <div style="font-size:36px;font-weight:500;color:#fff;letter-spacing:-0.03em">$49</div>
    <div style="font-size:14px;color:#9995b3;margin-left:8px">per application</div>
  </div>
  <div class="row">
    <div class="meta">status tag</div>
    <div style="font-size:11px;color:#1D9E75;background:rgba(29,158,117,0.12);border:1px solid rgba(29,158,117,0.25);border-radius:999px;padding:3px 10px;letter-spacing:0.04em;text-transform:uppercase">AI SCANS FOR COMPLIANCE</div>
  </div>
  <div class="row">
    <div class="meta">disclaimer</div>
    <div style="font-size:11px;color:#9995b3;letter-spacing:0.08em;text-transform:uppercase;opacity:0.7">NOT LEGAL ADVICE · AI GUIDANCE ONLY</div>
  </div>
  <div class="row">
    <div class="meta">code / spec</div>
    <div style="font-size:12px;color:#7F77DD">rgba(127, 119, 221, 0.12)</div>
  </div>
</body>
</html>
