<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e17; font-family: 'DM Sans', sans-serif; padding: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.zone { border-radius: 16px; padding: 28px 24px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; width: 200px; transition: all 0.2s; }
.zone-default { border: 2px dashed rgba(127,119,221,0.25); background: rgba(127,119,221,0.04); }
.zone-default:hover { border-color: rgba(127,119,221,0.5); background: rgba(127,119,221,0.08); }
.zone-drag { border: 2px dashed #7F77DD; background: rgba(127,119,221,0.1); }
.zone-uploading { border: 2px solid rgba(127,119,221,0.3); background: rgba(127,119,221,0.06); }
.zone-success { border: 2px solid #1D9E75; background: rgba(29,158,117,0.06); }
.icon-wrap { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.icon-default { background: rgba(127,119,221,0.12); }
.icon-success { background: rgba(29,158,117,0.15); }
.title { font-size: 13px; font-weight: 600; color: #fff; }
.sub { font-size: 11.5px; color: #9995b3; line-height: 1.5; }
.tag { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 20px; height: 20px; border: 2px solid rgba(127,119,221,0.2); border-top-color: #7F77DD; border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
  <div>
    <div class="tag" style="color:#9995b3;margin-bottom:8px">Default</div>
    <div class="zone zone-default">
      <div class="icon-wrap icon-default">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 13V7M7 10l3-3 3 3" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="14" height="14" rx="3" stroke="#7F77DD" stroke-width="1.5"/></svg>
      </div>
      <div class="title">Upload document</div>
      <div class="sub">Drag & drop or click to browse</div>
    </div>
  </div>
  <div>
    <div class="tag" style="color:#7F77DD;margin-bottom:8px">Drag active</div>
    <div class="zone zone-drag">
      <div class="icon-wrap" style="background:rgba(127,119,221,0.2)">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 13V7M7 10l3-3 3 3" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="14" height="14" rx="3" stroke="#7F77DD" stroke-width="1.5"/></svg>
      </div>
      <div class="title" style="color:#7F77DD">Drop to upload</div>
      <div class="sub">Release to add your file</div>
    </div>
  </div>
  <div>
    <div class="tag" style="color:#7F77DD;margin-bottom:8px">Uploading</div>
    <div class="zone zone-uploading">
      <div class="spinner"></div>
      <div class="title">Uploading…</div>
      <div class="sub">passport_photo.jpg</div>
    </div>
  </div>
  <div>
    <div class="tag" style="color:#1D9E75;margin-bottom:8px">Success</div>
    <div class="zone zone-success">
      <div class="icon-wrap icon-success">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#1D9E75" stroke-width="1.5"/><path d="M7 10l2.5 2.5L13 7" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="title" style="color:#1D9E75">Verified — Pass</div>
      <div class="sub">passport.pdf · 2 checks passed</div>
    </div>
  </div>
</body>
</html>
