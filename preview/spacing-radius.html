<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e17; font-family: 'DM Mono', monospace; padding: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
.item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.box { background: #231f3a; border: 1px solid rgba(127,119,221,0.25); width: 56px; height: 56px; }
.lbl { font-size: 9px; color: #9995b3; text-align: center; line-height: 1.4; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">xs<br>4px</div></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="lbl">sm<br>6px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">md<br>12px</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="lbl">lg<br>20px</div></div>
  <div class="item"><div class="box" style="border-radius:28px"></div><div class="lbl">xl<br>28px</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill<br>999px</div></div>
</body>
</html>
