<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e17; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
.phone { width: 180px; background: #0f0e17; border: 1px solid rgba(127,119,221,0.18); border-radius: 20px; overflow: hidden; }
.phone-nav { background: rgba(15,14,23,0.9); border-bottom: 1px solid rgba(127,119,221,0.12); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
.phone-logo { font-size: 13px; font-weight: 700; color: #fff; position: relative; }
.phone-logo::after { content: ''; display: block; position: absolute; bottom: -1px; left: 0; right: 0; height: 1.5px; background: #7F77DD; border-radius: 1px; }
.phone-menu { display: flex; gap: 4px; }
.phone-menu span { display: block; width: 14px; height: 1.5px; background: #9995b3; border-radius: 1px; }
.phone-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.phone-hero { text-align: center; padding: 12px 0 6px; }
.phone-h { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: #fff; line-height: 1.2; margin-bottom: 6px; }
.phone-sub { font-size: 10px; color: #9995b3; line-height: 1.5; margin-bottom: 10px; }
.phone-btn { width: 100%; background: #7F77DD; color: #fff; border: none; border-radius: 999px; padding: 8px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; }
.checklist-item { display: flex; align-items: center; gap: 8px; background: #231f3a; border: 1px solid rgba(127,119,221,0.12); border-radius: 8px; padding: 8px 10px; }
.ci-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ci-name { font-size: 10px; font-weight: 500; color: #fff; flex: 1; }
.ci-badge { font-family: 'DM Mono', monospace; font-size: 8px; padding: 2px 6px; border-radius: 999px; }
.lbl { font-family: 'DM Mono', monospace; font-size: 8px; color: #9995b3; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
</style>
</head>
<body>
  <div>
    <div class="lbl" style="color:#9995b3;margin-bottom:8px">Nav</div>
    <div style="width:280px;background:rgba(15,14,23,0.9);backdrop-filter:blur(20px);border:1px solid rgba(127,119,221,0.18);border-radius:12px;overflow:hidden">
      <div style="padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:15px;font-weight:700;color:#fff;position:relative;display:inline-block">Naviko<span style="position:absolute;bottom:-2px;left:0;right:0;height:2px;background:#7F77DD;border-radius:1px;display:block"></span></span>
        <div style="display:flex;gap:16px">
          <a href="#" style="font-size:12px;color:#9995b3;text-decoration:none">Pricing</a>
          <button style="font-size:11px;font-weight:600;padding:5px 12px;border-radius:999px;border:1.5px solid #7F77DD;color:#fff;background:transparent;font-family:'DM Sans',sans-serif;cursor:pointer">Get access</button>
        </div>
      </div>
    </div>
  </div>
  <div>
    <div class="lbl" style="color:#9995b3;margin-bottom:8px">Mobile · Hero + Checklist</div>
    <div class="phone">
      <div class="phone-nav">
        <div class="phone-logo">Naviko</div>
        <div class="phone-menu"><span></span><span style="margin-top:3px;display:block"></span><span style="margin-top:3px;display:block"></span></div>
      </div>
      <div class="phone-body">
        <div class="phone-hero">
          <div class="phone-h">Get your<br>green light.</div>
          <div class="phone-sub">AI verifies every document before you submit.</div>
          <button class="phone-btn">Check free</button>
        </div>
        <div class="lbl">Your checklist — H-1B</div>
        <div class="checklist-item">
          <div class="ci-icon" style="background:rgba(29,158,117,0.15)"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="#1D9E75" stroke-width="1"/><path d="M3 5l1.5 1.5 2.5-2.5" stroke="#1D9E75" stroke-width="1" stroke-linecap="round"/></svg></div>
          <span class="ci-name">Passport</span>
          <span class="ci-badge" style="background:rgba(29,158,117,0.12);color:#1D9E75;border:1px solid rgba(29,158,117,0.25)">Pass</span>
        </div>
        <div class="checklist-item">
          <div class="ci-icon" style="background:rgba(239,68,68,0.12)"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="#f87171" stroke-width="1"/><path d="M3.5 3.5l3 3M6.5 3.5l-3 3" stroke="#f87171" stroke-width="1" stroke-linecap="round"/></svg></div>
          <span class="ci-name">Photo</span>
          <span class="ci-badge" style="background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.25)">Fix</span>
        </div>
        <div class="checklist-item">
          <div class="ci-icon" style="background:rgba(153,149,179,0.1)"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="#9995b3" stroke-width="1" stroke-dasharray="1.5 1.5"/></svg></div>
          <span class="ci-name">Employment letter</span>
          <span class="ci-badge" style="background:rgba(153,149,179,0.1);color:#9995b3;border:1px solid rgba(153,149,179,0.2)">Missing</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
