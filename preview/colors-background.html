<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e17; font-family: 'DM Sans', sans-serif; padding: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.group { display: flex; flex-direction: column; gap: 8px; }
.label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #9995b3; margin-bottom: 4px; }
.swatch { width: 100px; height: 60px; border-radius: 8px; position: relative; }
.swatch-sm { width: 72px; height: 44px; border-radius: 6px; }
.name { font-family: 'DM Mono', monospace; font-size: 10px; color: #fff; margin-top: 4px; }
.val  { font-family: 'DM Mono', monospace; font-size: 9px; color: #9995b3; }
</style>
</head>
<body>
<div class="group">
  <div class="label">Backgrounds</div>
  <div style="display:flex;gap:8px;">
    <div>
      <div class="swatch" style="background:#0f0e17;border:1px solid rgba(127,119,221,0.25);"></div>
      <div class="name">bg-primary</div><div class="val">#0f0e17</div>
    </div>
    <div>
      <div class="swatch" style="background:#1a1730;"></div>
      <div class="name">bg-secondary</div><div class="val">#1a1730</div>
    </div>
    <div>
      <div class="swatch" style="background:#231f3a;"></div>
      <div class="name">surface</div><div class="val">#231f3a</div>
    </div>
    <div>
      <div class="swatch" style="background:#2c2750;"></div>
      <div class="name">surface-hover</div><div class="val">#2c2750</div>
    </div>
  </div>
</div>
</body>
</html>
