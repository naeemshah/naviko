<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e17; font-family: 'DM Sans', sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 8px; max-width: 420px; }
.lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: #9995b3; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 12px; background: #231f3a; border: 1px solid rgba(127,119,221,0.12); transition: border-color 0.2s; }
.item:hover { border-color: rgba(127,119,221,0.28); }
.icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.icon-pass    { background: rgba(29,158,117,0.15); }
.icon-fail    { background: rgba(239,68,68,0.12); }
.icon-upload  { background: rgba(127,119,221,0.12); }
.icon-pending { background: rgba(153,149,179,0.10); }
.name { font-size: 14px; font-weight: 500; color: #fff; flex: 1; }
.status { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
.s-pass    { background: rgba(29,158,117,0.12);  color: #1D9E75; border: 1px solid rgba(29,158,117,0.25); }
.s-fail    { background: rgba(239,68,68,0.12);   color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
.s-upload  { background: rgba(127,119,221,0.12); color: #7F77DD; border: 1px solid rgba(127,119,221,0.25); }
.s-pending { background: rgba(153,149,179,0.10); color: #9995b3; border: 1px solid rgba(153,149,179,0.2); }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 14px; height: 14px; border: 2px solid rgba(127,119,221,0.2); border-top-color: #7F77DD; border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
  <div class="lbl">Checklist items</div>
  <div class="item">
    <div class="icon icon-pass">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#1D9E75" stroke-width="1.3"/><path d="M4.5 7l1.8 1.8 3-3" stroke="#1D9E75" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="name">Passport copy</span>
    <span class="status s-pass">Pass</span>
  </div>
  <div class="item">
    <div class="icon icon-upload">
      <div class="spinner"></div>
    </div>
    <span class="name">Bank statements (3 months)</span>
    <span class="status s-upload">Uploading…</span>
  </div>
  <div class="item">
    <div class="icon icon-fail">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#f87171" stroke-width="1.3"/><path d="M5 5l4 4M9 5l-4 4" stroke="#f87171" stroke-width="1.3" stroke-linecap="round"/></svg>
    </div>
    <span class="name">Passport photo</span>
    <span class="status s-fail">Fix This</span>
  </div>
  <div class="item">
    <div class="icon icon-pending">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#9995b3" stroke-width="1.3" stroke-dasharray="2 2"/></svg>
    </div>
    <span class="name">Employment letter</span>
    <span class="status s-pending">Missing</span>
  </div>
  <div class="item">
    <div class="icon icon-pending">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#9995b3" stroke-width="1.3" stroke-dasharray="2 2"/></svg>
    </div>
    <span class="name">Academic transcripts</span>
    <span class="status s-pending">Missing</span>
  </div>
</body>
</html>
